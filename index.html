    <script>
        let currentIndex = 0;  // 当前显示的图片索引
        const slides = document.querySelector('.slides');
        const totalSlides = document.querySelectorAll('.slide').length;

        // 自动切换图片
        function showNextSlide() {
            currentIndex = (currentIndex + 1) % totalSlides;  // 循环显示图片
            updateSlider();
        }

        // 更新轮播图
        function updateSlider() {
            slides.style.transform = `translateX(-${currentIndex * 100}%)`;  // 移动到对应的图片
        }

        // 每3秒自动切换图片
        setInterval(showNextSlide, 3000);

        function goToPage2() {
            window.location.href = "page2.html"; // 页面跳转到 page2.html
        }
   
    </script>
     
    <script>
// ==================== 我家小宝天数计数器 ====================
function updateBabyDays() {
    // ★★★★★ 这里改成宝宝出生日期 ★★★★★
    const birthDate = new Date('2023-10-29');   // ←←← 改成真正的出生年-月-日！！！
    
    const now = new Date();
    const diffTime = now - birthDate;
    const days = Math.floor(diffTime / (1000 * 60 * 60 * 24));
    
    document.getElementById('babyDays').textContent = days;
}

// 页面加载时立刻执行 + 每分钟检查一次（防止跨天）
window.onload = updateBabyDays;
setInterval(updateBabyDays, 60000);
</script>

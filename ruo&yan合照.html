<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我们的相册</title>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg1: #eef4fb;
      --bg2: #d9e8f5;
      --card: rgba(255, 255, 255, 0.72);
      --card-border: rgba(255, 255, 255, 0.8);
      --text: #0f172a;
      --muted: #64748b;
      --shadow: 0 12px 40px rgba(15, 23, 42, 0.12);
      --shadow-soft: 0 6px 20px rgba(15, 23, 42, 0.08);
      --accent: #007aff;
      --accent-hover: #0062cc;
      --danger: #ff3b30;
      --danger-hover: #e0241b;
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
        "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.95), transparent 42%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
    }

    body {
      padding: 24px;
    }

    .app {
      max-width: 1300px;
      margin: 0 auto;
    }

    .hero {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 22px 22px 18px;
      margin-bottom: 18px;
    }

    .title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: clamp(28px, 3vw, 42px);
      letter-spacing: -0.04em;
      line-height: 1.05;
    }

    .title-wrap p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(148,163,184,0.2);
      color: #0f172a;
      box-shadow: var(--shadow-soft);
      white-space: nowrap;
      font-size: 14px;
    }

    .toolbar {
      margin-top: 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .file-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 16px;
      border-radius: 14px;
      background: rgba(255,255,255,0.95);
      border: 1px solid rgba(148,163,184,0.25);
      box-shadow: var(--shadow-soft);
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease;
      user-select: none;
      font-weight: 600;
    }

    .file-label:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
    }

    .hidden-input {
      display: none;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform .15s ease, background .15s ease, box-shadow .15s ease, opacity .15s ease;
      box-shadow: var(--shadow-soft);
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      color: white;
      background: linear-gradient(180deg, #2d8cff, #007aff);
    }

    .btn-primary:hover {
      background: linear-gradient(180deg, #2382f6, var(--accent-hover));
    }

    .btn-secondary {
      color: #0f172a;
      background: rgba(255,255,255,0.95);
      border: 1px solid rgba(148,163,184,0.25);
    }

    .btn-secondary:hover {
      background: white;
    }

    .btn:disabled {
      opacity: .6;
      cursor: not-allowed;
      transform: none;
    }

    .file-info {
      color: var(--muted);
      font-size: 14px;
      margin-left: 4px;
    }

    .status {
      margin-top: 14px;
      font-size: 14px;
      color: var(--muted);
      min-height: 20px;
    }

    .gallery-wrap {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 18px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .section-head span {
      color: var(--muted);
      font-size: 14px;
    }

    .gallery {
      column-count: 5;
      column-gap: 14px;
    }

    @media (max-width: 1200px) {
      .gallery { column-count: 4; }
    }

    @media (max-width: 900px) {
      .gallery { column-count: 3; }
    }

    @media (max-width: 640px) {
      body { padding: 14px; }
      .gallery { column-count: 2; }
      .hero, .gallery-wrap { padding: 16px; }
    }

    @media (max-width: 420px) {
      .gallery { column-count: 1; }
    }

    .photo-card {
      break-inside: avoid;
      margin: 0 0 14px;
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.75);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.10);
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .photo-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.14);
    }

    .photo-card img {
      width: 100%;
      display: block;
      object-fit: cover;
      background: #fff;
    }

    .photo-meta {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 10px 10px 12px;
      background: linear-gradient(180deg, transparent, rgba(15,23,42,0.62));
      color: white;
      opacity: 0;
      transition: opacity .18s ease;
      pointer-events: none;
    }

    .photo-card:hover .photo-meta {
      opacity: 1;
    }

    .photo-name {
      font-size: 12px;
      line-height: 1.3;
      word-break: break-all;
      opacity: .95;
    }

    .del-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      border: none;
      border-radius: 999px;
      width: 36px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 59, 48, 0.92);
      color: white;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(255, 59, 48, 0.28);
      opacity: 0;
      transform: scale(0.95);
      transition: opacity .18s ease, transform .18s ease, background .18s ease;
      font-size: 22px;
      line-height: 1;
    }

    .photo-card:hover .del-btn {
      opacity: 1;
      transform: scale(1);
    }

    .del-btn:hover {
      background: var(--danger-hover);
    }

    .empty {
      padding: 40px 10px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(100,116,139,.25);
      border-top-color: rgba(100,116,139,.9);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: -3px;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div class="app">
    <section class="hero">
      <div class="title-row">
        <div class="title-wrap">
          <h1>我们的相册 ❤️</h1>
          <p>像苹果相册一样，轻盈、干净、直接管理云端照片。</p>
        </div>
        <div class="badge">📷 Supabase 云相册</div>
      </div>

      <div class="toolbar">
        <label class="file-label" for="fileInput">选择照片</label>
        <input class="hidden-input" type="file" id="fileInput" accept="image/*" multiple />

        <button class="btn btn-primary" type="button" onclick="uploadImage()">上传照片</button>
        <button class="btn btn-secondary" type="button" onclick="loadGallery()">刷新相册</button>

        <span class="file-info" id="fileInfo">未选择文件</span>
      </div>

      <div class="status" id="status"></div>
    </section>

    <section class="gallery-wrap">
      <div class="section-head">
        <h2>相册</h2>
        <span id="countText">正在加载...</span>
      </div>

      <div id="gallery" class="gallery">
        <div class="empty">正在加载照片...</div>
      </div>
    </section>
  </div>

  <script>
    // ====== Supabase 配置 ======
    const SUPABASE_URL = "https://grphursesmjllprmjbze.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_kl6Ycx4WVIDdkOxB1fbEXA_T873c28v";
    const BUCKET_NAME = "photos";

    if (!window.supabase) {
      alert("Supabase JS 没有加载成功，请检查 CDN 网络。");
      throw new Error("Supabase JS not loaded");
    }

    const { createClient } = window.supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const fileInput = document.getElementById("fileInput");
    const fileInfo = document.getElementById("fileInfo");
    const statusEl = document.getElementById("status");
    const galleryEl = document.getElementById("gallery");
    const countText = document.getElementById("countText");

    fileInput.addEventListener("change", () => {
      const files = Array.from(fileInput.files || []);
      if (files.length === 0) {
        fileInfo.textContent = "未选择文件";
      } else if (files.length === 1) {
        fileInfo.textContent = `已选择 1 张：${files[0].name}`;
      } else {
        fileInfo.textContent = `已选择 ${files.length} 张照片`;
      }
    });

    window.addEventListener("DOMContentLoaded", () => {
      loadGallery();
    });

    function setStatus(text) {
      statusEl.textContent = text || "";
    }

    function formatTime(value) {
      if (!value) return "";
      const d = new Date(value);
      if (isNaN(d.getTime())) return "";
      return d.toLocaleString("zh-CN", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    // ✅ 重点修复：文件名只使用英文/数字/随机串，避免 Invalid key
    function createUniqueFileName(originalName) {
      const extMatch = originalName.match(/\.[^.]+$/);
      const ext = extMatch ? extMatch[0].toLowerCase() : "";
      return `${Date.now()}_${Math.random().toString(36).slice(2, 10)}${ext}`;
    }

    // ====== 加载相册 ======
    async function loadGallery() {
      countText.textContent = "加载中...";
      galleryEl.innerHTML = `
        <div class="empty">
          <span class="spinner"></span>正在加载相册...
        </div>
      `;

      const { data, error } = await supabaseClient.storage
        .from(BUCKET_NAME)
        .list("", {
          sortBy: { column: "created_at", order: "desc" }
        });

      if (error) {
        console.error("加载失败：", error);
        galleryEl.innerHTML = `<div class="empty">加载失败，请检查 bucket 名称和权限。</div>`;
        countText.textContent = "加载失败";
        setStatus("加载相册失败：" + error.message);
        return;
      }

      const files = (data || []).filter(item => item && item.name && !item.name.endsWith("/"));

      if (files.length === 0) {
        galleryEl.innerHTML = `<div class="empty">还没有上传照片，先传一张试试吧。</div>`;
        countText.textContent = "0 张照片";
        setStatus("");
        return;
      }

      const items = await Promise.all(
        files.map(async (file) => {
          const { data: urlData, error: urlError } = await supabaseClient.storage
            .from(BUCKET_NAME)
            .createSignedUrl(file.name, 60 * 60);

          if (urlError || !urlData?.signedUrl) {
            console.error("签名链接失败：", file.name, urlError);
            return null;
          }

          return {
            name: file.name,
            url: urlData.signedUrl,
            created_at: file.created_at || file.updated_at || ""
          };
        })
      );

      const validItems = items.filter(Boolean);

      galleryEl.innerHTML = "";
      countText.textContent = `${validItems.length} 张照片`;
      setStatus("");

      for (const item of validItems) {
        addPhotoCard(item.name, item.url, item.created_at);
      }
    }

    // ====== 上传照片 ======
    async function uploadImage() {
      const files = Array.from(fileInput.files || []);

      if (files.length === 0) {
        alert("请选择照片");
        return;
      }

      const uploadBtn = document.querySelector(".btn-primary");
      const refreshBtn = document.querySelector(".btn-secondary");

      uploadBtn.disabled = true;
      refreshBtn.disabled = true;
      setStatus(`正在上传 ${files.length} 张照片...`);

      try {
        for (let i = 0; i < files.length; i++) {
          const file = files[i];
          const fileName = createUniqueFileName(file.name);

          const { error } = await supabaseClient.storage
            .from(BUCKET_NAME)
            .upload(fileName, file, {
              cacheControl: "3600",
              upsert: false,
              contentType: file.type || "image/jpeg"
            });

          if (error) {
            console.error("上传失败：", error);
            throw new Error(`${file.name} 上传失败：${error.message}`);
          }

          setStatus(`已上传 ${i + 1}/${files.length} 张...`);
        }

        alert("上传成功！");
        fileInput.value = "";
        fileInfo.textContent = "未选择文件";
        await loadGallery();
      } catch (err) {
        console.error(err);
        alert("上传失败：" + err.message);
        setStatus("上传失败：" + err.message);
      } finally {
        uploadBtn.disabled = false;
        refreshBtn.disabled = false;
      }
    }

    // ====== 删除照片 ======
    async function deleteImage(filePath, cardEl) {
      const yes = confirm("确定要删除这张照片吗？");
      if (!yes) return;

      const { error } = await supabaseClient.storage
        .from(BUCKET_NAME)
        .remove([filePath]);

      if (error) {
        console.error("删除失败：", error);
        alert("删除失败：" + error.message);
        return;
      }

      cardEl.remove();
      alert("已删除");
      await loadGallery();
    }

    // ====== 渲染一张图片 ======
    function addPhotoCard(filePath, url, createdAt) {
      const card = document.createElement("div");
      card.className = "photo-card";

      const img = document.createElement("img");
      img.src = url;
      img.alt = "相册照片";
      img.loading = "lazy";

      img.addEventListener("load", () => {
        const ratio = img.naturalHeight / img.naturalWidth;
        const maxHeight = 420;
        const minHeight = 180;
        let h = Math.round(220 * ratio);
        if (!isFinite(h) || h <= 0) h = 220;
        h = Math.max(minHeight, Math.min(maxHeight, h));
        img.style.height = h + "px";
      });

      img.addEventListener("error", () => {
        img.style.height = "220px";
        img.style.objectFit = "contain";
        img.style.background = "#fff";
      });

      const delBtn = document.createElement("button");
      delBtn.className = "del-btn";
      delBtn.type = "button";
      delBtn.title = "删除";
      delBtn.innerHTML = "×";
      delBtn.onclick = () => deleteImage(filePath, card);

      const meta = document.createElement("div");
      meta.className = "photo-meta";
      meta.innerHTML = `
        <div class="photo-name">${filePath}</div>
        <div style="font-size:11px; opacity:.8; margin-top:4px;">${formatTime(createdAt)}</div>
      `;

      card.appendChild(img);
      card.appendChild(delBtn);
      card.appendChild(meta);
      galleryEl.appendChild(card);
    }

    // 让按钮 onclick 可以直接调用
    window.uploadImage = uploadImage;
    window.loadGallery = loadGallery;
  </script>
</body>
</html>
